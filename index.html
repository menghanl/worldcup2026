<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- NOTE: no viewport-fit=cover — WebKit bugs 237961/254868: in standalone
     home-screen apps it shrinks the layout viewport (phantom toolbar strip at
     the bottom). hnhn works without it; safe-area env() degrades to 0. -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>World Cup 2026 — Live</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card2: #1c2330;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --faint: #6e7681;
    --live: #3fb950;
    --live-dim: rgba(63, 185, 80, .12);
    --next: #d29922;
    --next-dim: rgba(210, 153, 34, .10);
    --topbar-h: 48px;
  }
  * { box-sizing: border-box; }
  html { color-scheme: dark; height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    /* App-style split layout: header + pinned hero, schedule scrolls on its
       own. Anchored to the viewport edges with fixed+inset instead of
       100dvh/100vh — iOS standalone PWAs miscompute viewport-height units
       (phantom toolbar -> dead strip at the bottom), but edge anchoring
       doesn't involve any height computation. */
    position: fixed; inset: 0;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ---------- top bar ---------- */
  .topbar {
    flex: none; z-index: 30;
    height: calc(var(--topbar-h) + env(safe-area-inset-top));
    padding-top: env(safe-area-inset-top);
    display: flex; align-items: center; gap: 10px;
    background: rgba(13, 17, 23, .88);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
  }
  .topbar h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: .2px; }
  .topbar .updated { margin-left: auto; font-size: 11px; color: var(--faint); text-align: right; }
  .topbar button {
    background: none; border: none; color: var(--muted); padding: 6px;
    border-radius: 8px; cursor: pointer; display: flex;
  }
  .topbar button:active { background: var(--card2); }
  .topbar svg { width: 18px; height: 18px; }
  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- auto-refresh menu ---------- */
  #menuBackdrop { position: fixed; inset: 0; z-index: 55; display: none; }
  #menuBackdrop.open { display: block; }
  .menu {
    position: fixed; right: 8px; z-index: 60;
    top: calc(var(--topbar-h) + env(safe-area-inset-top) + 4px);
    background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, .55); padding: 6px; min-width: 185px;
    display: none;
  }
  .menu.open { display: block; }
  .menu .mhead {
    font-size: 10.5px; color: var(--faint); text-transform: uppercase;
    letter-spacing: .8px; padding: 6px 12px 4px;
  }
  .menu button {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    width: 100%; background: none; border: none; color: var(--text);
    font-size: 13.5px; font-weight: 500; padding: 9px 12px; border-radius: 8px;
    cursor: pointer; text-align: left;
  }
  .menu button:active { background: var(--border); }
  .menu button .chk { color: var(--live); font-weight: 700; visibility: hidden; }
  .menu button.sel .chk { visibility: visible; }

  main {
    max-width: 640px; margin: 0 auto; padding: 12px 12px 0; width: 100%;
    flex: 1; min-height: 0; display: flex; flex-direction: column;
  }
  .view { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .view[hidden] { display: none; }
  .scroller {
    flex: 1; min-height: 0; overflow-y: auto;
    -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
    padding-bottom: 12px;   /* tabbar is in flow below; no clearance needed */
  }

  /* ---------- hero (pinned; swipeable carousel when 2 games live) ---------- */
  .hero {
    flex: none; margin-bottom: 12px;
    display: flex; gap: 10px; overflow-x: auto;
    scroll-snap-type: x mandatory; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .hero::-webkit-scrollbar { display: none; }
  .hero:empty { display: none; }
  .hero-card { flex: 0 0 100%; scroll-snap-align: center; }
  .hero:has(> .hero-card:nth-child(2)) .hero-card { flex-basis: 88%; }
  .hero-card {
    border: 1px solid var(--border); border-radius: 16px;
    background: var(--card); padding: 14px 14px 12px; cursor: pointer;
  }
  .hero-card.live { border-color: rgba(63,185,80,.55); background: linear-gradient(var(--live-dim), transparent 70%), var(--card); }
  .hero-card.next { border-color: rgba(210,153,34,.45); background: linear-gradient(var(--next-dim), transparent 70%), var(--card); }
  .hero-tag {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  }
  .hero-card.live .hero-tag { color: var(--live); }
  .hero-card.next .hero-tag { color: var(--next); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .hero-row { display: flex; align-items: center; margin: 12px 0 8px; }
  .hero-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
  .hero-team img { width: 52px; height: 52px; }
  .hero-team .tname { font-size: 13px; font-weight: 600; text-align: center; line-height: 1.25; }
  .hero-mid { flex: 0 0 auto; padding: 0 10px; text-align: center; }
  .hero-score { font-size: 34px; font-weight: 800; letter-spacing: 1px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .hero-vs { font-size: 16px; font-weight: 700; color: var(--faint); }
  .hero-sub { text-align: center; font-size: 12.5px; color: var(--muted); }
  .hero-sub b { color: var(--text); font-weight: 600; }
  .hero-meta { text-align: center; font-size: 11.5px; color: var(--faint); margin-top: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pens { font-size: 13px; color: var(--muted); font-weight: 600; }

  /* ---------- filter chips ---------- */
  .chips {
    flex: none;
    display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 12px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; border: 1px solid var(--border); background: var(--card);
    color: var(--muted); font-size: 12.5px; font-weight: 600;
    padding: 6px 12px; border-radius: 999px; cursor: pointer; white-space: nowrap;
  }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ---------- schedule (inside .scroller) ---------- */
  .day { scroll-margin-top: 4px; }
  .day-h {
    position: sticky; top: 0; z-index: 20;
    font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
    color: var(--muted); padding: 10px 4px 8px;
    background: linear-gradient(var(--bg) 75%, transparent);
  }
  .day-h .today-tag { color: var(--live); }
  .games { display: grid; gap: 8px; margin-bottom: 14px; }
  .game {
    display: grid; grid-template-columns: 58px 1fr; gap: 4px 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 12px; align-items: center;
  }
  .game.live { border-color: rgba(63,185,80,.55); background: linear-gradient(90deg, var(--live-dim), transparent 55%), var(--card); }
  .game.post { opacity: .82; }
  .when { text-align: center; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; align-self: center; grid-row: span 2; }
  .when .live-clock { color: var(--live); font-weight: 800; font-size: 13px; }
  .when .ft { font-weight: 700; color: var(--faint); }
  .teams { display: grid; gap: 5px; min-width: 0; }
  .trow { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .trow img { width: 20px; height: 20px; flex: 0 0 auto; }
  .trow .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .trow .nm.tbd { color: var(--muted); font-size: 13px; font-weight: 400; }
  .trow .sc { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 16px; text-align: right; }
  .game.live .sc { color: var(--live); }
  .post .loser .nm, .post .loser .sc { color: var(--muted); font-weight: 400; }
  .gmeta {
    grid-column: 2; font-size: 11px; color: var(--faint);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-top: 1px;
  }

  /* ---------- misc ---------- */
  .state-panel { text-align: center; color: var(--muted); padding: 60px 20px; }
  .state-panel button {
    margin-top: 14px; background: var(--card2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .loader { width: 26px; height: 26px; margin: 0 auto 12px; border: 3px solid var(--border);
    border-top-color: var(--live); border-radius: 50%; animation: spin .9s linear infinite; }
  #banner {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(124px + env(safe-area-inset-bottom)); z-index: 40;
    background: #3d2300; color: #f0b95c; border: 1px solid #7a4d00;
    font-size: 12.5px; padding: 8px 14px; border-radius: 999px;
    opacity: 0; pointer-events: none; transition: opacity .3s; white-space: nowrap;
  }
  #banner.show { opacity: 1; }
  #todayBtn {
    position: fixed; right: max(14px, env(safe-area-inset-right));
    bottom: calc(70px + env(safe-area-inset-bottom)); z-index: 40;
    background: var(--card2); color: var(--text); border: 1px solid var(--border);
    border-radius: 999px; padding: 10px 16px; font-size: 13px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.45); display: none;
  }
  .src-note { text-align: center; font-size: 10.5px; color: var(--faint); padding: 18px 0 8px; }

  /* ---------- bottom tab bar (in flex flow, not floating) ---------- */
  .tabbar {
    flex: none; z-index: 35;
    display: flex;
    background: rgba(13, 17, 23, .92);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    /* without viewport-fit=cover env() may be 0; keep clearance for the
       home indicator either way */
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 0 7px; background: none; border: none;
    color: var(--faint); font-size: 10.5px; font-weight: 600; cursor: pointer;
  }
  .tab.active { color: var(--live); }
  .tab svg { width: 21px; height: 21px; }

  /* ---------- groups (standings) ---------- */
  .groups { display: grid; gap: 10px; }
  @media (min-width: 560px) { .groups { grid-template-columns: 1fr 1fr; } }
  .gcard { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px 6px; }
  .gcard h3 {
    margin: 0 0 8px; font-size: 11.5px; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; color: var(--muted);
  }
  .grow {
    display: grid; grid-template-columns: 16px 22px 1fr 26px 52px 34px 30px;
    gap: 6px; align-items: center; padding: 5px 4px; border-radius: 6px;
    font-size: 13px;
  }
  .grow.hdr { font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; padding: 0 4px 4px; }
  .grow img { width: 18px; height: 18px; }
  .grow .gnm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .grow .num { text-align: center; font-variant-numeric: tabular-nums; color: var(--muted); }
  .grow .pts { font-weight: 700; color: var(--text); }
  .grow .rk { color: var(--faint); font-size: 11px; text-align: center; }
  .grow.q12 { box-shadow: inset 2.5px 0 0 var(--live); }
  .grow.q3 { box-shadow: inset 2.5px 0 0 var(--next); }
  .legend { font-size: 10.5px; color: var(--faint); padding: 8px 4px 0; }
  .legend .sw { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin: 0 4px 0 10px; vertical-align: baseline; }

  /* ---------- goal scorers ---------- */
  .scorers { font-size: 10.5px; color: var(--muted); padding-left: 28px; line-height: 1.35; }
  .hero-scorers { display: flex; margin-top: 2px; }
  .hero-scorers > div { flex: 1; text-align: center; font-size: 10.5px; color: var(--muted); padding: 0 6px; }

  /* ---------- goal flash + toast ---------- */
  @keyframes goalflash {
    0% { background-color: rgba(63, 185, 80, .38); }
    100% { background-color: transparent; }
  }
  .game.flash, .hero-card.flash { animation: goalflash 3s ease-out; }
  #goalToast {
    position: fixed; left: 50%; transform: translate(-50%, -14px);
    top: calc(var(--topbar-h) + env(safe-area-inset-top) + 10px); z-index: 50;
    background: #112a18; color: #7ee2a0; border: 1px solid #2f7d46;
    border-radius: 12px; padding: 8px 16px; font-size: 13px; font-weight: 600;
    text-align: center; max-width: 92vw; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  #goalToast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="topbar">
  <h1>World Cup 2026</h1>
  <div class="updated" id="updated"></div>
  <button id="autoBtn" aria-label="Auto-refresh settings" title="Auto-refresh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 2h6"/>
    </svg>
  </button>
  <button id="refreshBtn" aria-label="Refresh" title="Refresh">
    <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/>
    </svg>
  </button>
</header>

<main>
  <div id="matchesView" class="view">
    <section class="hero" id="hero"></section>
    <nav class="chips" id="chips" style="display:none"></nav>
    <div class="scroller" id="schedScroll">
      <section id="schedule">
        <div class="state-panel"><div class="loader"></div>Loading matches…</div>
      </section>
      <div class="src-note">Times shown in your local timezone · Data: ESPN</div>
    </div>
  </div>
  <div id="groupsView" class="view" hidden>
    <div class="scroller" id="groupScroll">
      <section class="groups" id="groups">
        <div class="state-panel"><div class="loader"></div>Loading standings…</div>
      </section>
      <div class="legend">
        <span class="sw" style="background:var(--live)"></span>Top 2 advance
        <span class="sw" style="background:var(--next)"></span>3rd — may advance (8 best)
      </div>
      <div class="src-note">Times shown in your local timezone · Data: ESPN</div>
    </div>
  </div>
</main>

<nav class="tabbar">
  <button class="tab active" data-view="matches">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
    Matches
  </button>
  <button class="tab" data-view="groups">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    Groups
  </button>
</nav>

<button id="todayBtn">↓ Today</button>
<div id="banner">Couldn’t update — retrying</div>
<div id="goalToast"></div>

<div id="menuBackdrop"></div>
<div class="menu" id="autoMenu">
  <div class="mhead">Auto-refresh</div>
  <button data-mode="smart">Smart — match-aware<span class="chk">✓</span></button>
  <button data-mode="30">Every 30 sec<span class="chk">✓</span></button>
  <button data-mode="60">Every 1 min<span class="chk">✓</span></button>
  <button data-mode="300">Every 5 min<span class="chk">✓</span></button>
  <button data-mode="off">Off<span class="chk">✓</span></button>
  <div class="mhead">Team names · 语言</div>
  <button data-lang="en">English<span class="chk">✓</span></button>
  <button data-lang="zh">中文<span class="chk">✓</span></button>
</div>

<script>
'use strict';

const API = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200';
const STANDINGS_API = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026';

const ROUND_NAMES = {
  'group-stage': 'Group Stage',
  'round-of-32': 'Round of 32',
  'round-of-16': 'Round of 16',
  'quarterfinals': 'Quarter-final',
  'semifinals': 'Semi-final',
  '3rd-place-match': 'Third Place',
  'final': 'Final',
};
const CHIP_DEFS = [
  { id: 'all', label: 'All' },
  { id: 'group-stage', label: 'Groups' },
  { id: 'round-of-32', label: 'R32' },
  { id: 'round-of-16', label: 'R16' },
  { id: 'quarterfinals', label: 'QF' },
  { id: 'semifinals', label: 'SF' },
  { id: 'finals', label: 'Finals', slugs: ['3rd-place-match', 'final'] },
];
window.CREST_URI = 'data:image/svg+xml,' + encodeURIComponent(
  "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none' stroke='#6e7681' stroke-width='2'>" +
  "<circle cx='16' cy='16' r='13'/><path d='M16 10l5.5 4-2.1 6.4h-6.8L10.5 14z' fill='#6e7681' stroke='none'/></svg>");

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

let events = [];          // normalized, sorted by kickoff
let filter = 'all';
let view = 'matches';     // matches | groups
let lastUpdated = null;
let fetching = false;
let refreshTimer = null;
let didAutoScroll = false;
let kickoffFetched = false;

let standings = null;     // [{letter, entries: [{id,name,logo,gp,record,gd,pts,rank}]}]
let teamGroup = {};       // teamId -> group letter
let standingsAt = 0;
let prevScores = new Map();  // eventId -> "home-away" from previous poll

// auto-refresh mode: 'smart' (match-aware) | seconds as string | 'off'
const MODES = ['smart', '30', '60', '300', 'off'];
const MODE_LABEL = { smart: 'auto', 30: '30s', 60: '1m', 300: '5m', off: 'off' };
let refreshMode = (() => {
  try { const m = localStorage.getItem('wc26-refresh'); return MODES.includes(m) ? m : 'smart'; }
  catch { return 'smart'; }
})();

// ---- nation name translation (browser CLDR via Intl.DisplayNames) ----
let lang = (() => {
  try { return localStorage.getItem('wc26-lang') === 'zh' ? 'zh' : 'en'; }
  catch { return 'en'; }
})();
// FIFA trigram -> ISO 3166-1 alpha-2 (the 48 qualified teams)
const FIFA_TO_ISO = {
  ALG: 'DZ', ARG: 'AR', AUS: 'AU', AUT: 'AT', BEL: 'BE', BRA: 'BR', CAN: 'CA',
  CIV: 'CI', COD: 'CD', COL: 'CO', CPV: 'CV', CRO: 'HR', CUW: 'CW', CZE: 'CZ',
  ECU: 'EC', EGY: 'EG', ESP: 'ES', FRA: 'FR', GER: 'DE', GHA: 'GH', HAI: 'HT',
  IRN: 'IR', IRQ: 'IQ', JOR: 'JO', JPN: 'JP', KOR: 'KR', KSA: 'SA', MAR: 'MA',
  MEX: 'MX', NED: 'NL', NOR: 'NO', NZL: 'NZ', PAN: 'PA', PAR: 'PY', POR: 'PT',
  QAT: 'QA', RSA: 'ZA', SEN: 'SN', SUI: 'CH', SWE: 'SE', TUN: 'TN', TUR: 'TR',
  URU: 'UY', USA: 'US', UZB: 'UZ',
};
// football nations without ISO codes + short forms where CLDR is too long
const ZH_OVERRIDE = { ENG: '英格兰', SCO: '苏格兰', BIH: '波黑' };
let zhNames = null;
function teamName(t) {
  if (lang !== 'zh' || t.tbd || !t.abbr) return t.name;
  if (ZH_OVERRIDE[t.abbr]) return ZH_OVERRIDE[t.abbr];
  const iso = FIFA_TO_ISO[t.abbr];
  if (!iso) return t.name;
  try {
    zhNames ||= new Intl.DisplayNames(['zh-Hans'], { type: 'region' });
    return zhNames.of(iso) || t.name;
  } catch { return t.name; }
}
function setLang(l) {
  lang = l;
  try { localStorage.setItem('wc26-lang', l); } catch {}
  document.querySelectorAll('#autoMenu button[data-lang]').forEach(b =>
    b.classList.toggle('sel', b.dataset.lang === l));
  toggleMenu(false);
  render();
  renderGroups();
}

/* ---------------- data ---------------- */

function normTeam(x) {
  const t = x.team || {};
  const name = t.shortDisplayName || t.displayName || 'TBD';
  return {
    id: t.id || '',
    name,
    abbr: t.abbreviation || '',
    logo: t.logo || '',
    score: x.score,
    shootout: x.shootoutScore,
    winner: x.winner === true,
    tbd: !t.logo,   // knockout placeholders ("Round of 16 5 Winner") have no logo
  };
}

// scoring plays from competition.details -> [{teamId, text: "Doe 23' (P)"}]
function parseGoals(details) {
  const out = [];
  for (const d of (details || [])) {
    if (!d.scoringPlay) continue;
    const typeText = ((d.type || {}).text || '').toLowerCase();
    const ath = (d.athletesInvolved || [])[0] || {};
    let name = ath.shortName || ath.displayName || '';
    // "C. Ronaldo" style is already short; last word fallback for long names
    if (name.split(' ').length > 2) name = name.split(' ').slice(-1)[0];
    const min = (d.clock || {}).displayValue || '';
    let suffix = '';
    if (typeText.includes('penalty')) suffix = ' (P)';
    else if (typeText.includes('own')) suffix = ' (OG)';
    out.push({ teamId: String((d.team || {}).id || ''), text: (name + ' ' + min + suffix).trim() });
  }
  return out;
}

function normalize(json) {
  const out = [];
  for (const e of (json.events || [])) {
    const c = (e.competitions || [])[0];
    if (!c) continue;
    const home = (c.competitors || []).find(x => x.homeAway === 'home');
    const away = (c.competitors || []).find(x => x.homeAway === 'away');
    if (!home || !away) continue;
    const st = e.status || c.status || {};
    const ty = st.type || {};
    out.push({
      id: e.id,
      date: new Date(e.date),
      round: (e.season && e.season.slug) || 'group-stage',
      state: ty.state || 'pre',                  // pre | in | post
      statusName: ty.name || '',
      shortDetail: ty.shortDetail || '',
      clock: st.displayClock || '',
      venue: (c.venue && c.venue.fullName) || '',
      tv: (((c.broadcasts || [])[0] || {}).names || []).join(' · '),
      goals: parseGoals(c.details),
      home: normTeam(home),
      away: normTeam(away),
    });
  }
  out.sort((a, b) => a.date - b.date);
  return out;
}

async function fetchData(manual) {
  if (fetching) return;
  fetching = true;
  $('refreshIcon').classList.add('spinning');
  try {
    const res = await fetch(API, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    events = normalize(await res.json());
    lastUpdated = new Date();
    kickoffFetched = false;
    $('banner').classList.remove('show');
    const goals = detectGoalChanges();
    render();
    announceGoals(goals);
    if (Date.now() - standingsAt > 60 * 1000) fetchStandings();
  } catch (err) {
    if (events.length) {
      $('banner').classList.add('show');
      setTimeout(() => $('banner').classList.remove('show'), 4000);
    } else {
      $('schedule').innerHTML =
        '<div class="state-panel">Couldn’t load match data.<br>' +
        '<small>' + esc(err.message) + '</small><br>' +
        '<button onclick="fetchData(true)">Retry</button></div>';
    }
  } finally {
    fetching = false;
    $('refreshIcon').classList.remove('spinning');
    scheduleRefresh();
  }
}

// compare scores with the previous poll; returns events whose score changed
function detectGoalChanges() {
  const changed = [];
  for (const e of events) {
    if (e.state === 'pre') continue;
    const key = (e.home.score ?? '') + '-' + (e.away.score ?? '');
    const prev = prevScores.get(e.id);
    if (prev !== undefined && prev !== key) changed.push(e);
    prevScores.set(e.id, key);
  }
  return changed;
}

let toastTimer = null;
function announceGoals(changed) {
  if (!changed.length) return;
  for (const e of changed) {
    const card = $('g-' + e.id);
    if (card) { card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash'); }
    const hero = document.querySelector('.hero-card[data-goto="' + e.id + '"]');
    if (hero) { hero.classList.remove('flash'); void hero.offsetWidth; hero.classList.add('flash'); }
  }
  const lines = changed.map(e =>
    '⚽ ' + liveClock(e) + ' ' + teamName(e.home) + ' ' + (e.home.score ?? '') +
    '–' + (e.away.score ?? '') + ' ' + teamName(e.away));
  const toast = $('goalToast');
  toast.innerHTML = lines.map(esc).join('<br>');
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 6000);
}

let fetchingStandings = false;
async function fetchStandings() {
  if (fetchingStandings) return;
  fetchingStandings = true;
  try {
    const res = await fetch(STANDINGS_API, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const groups = [];
    for (const child of (json.children || [])) {
      const letter = (child.name || '').replace(/^Group\s+/i, '');
      const entries = [];
      for (const en of ((child.standings || {}).entries || [])) {
        const t = en.team || {};
        const stat = n => {
          const s = (en.stats || []).find(x => x.name === n) || {};
          return s.displayValue ?? '';
        };
        entries.push({
          id: String(t.id || ''),
          name: t.shortDisplayName || t.displayName || '',
          abbr: t.abbreviation || '',
          logo: ((t.logos || [])[0] || {}).href || '',
          gp: stat('gamesPlayed'),
          record: stat('overall'),
          gd: stat('pointDifferential'),
          pts: stat('points'),
          rank: Number(stat('rank')) || entries.length + 1,
        });
        teamGroup[String(t.id || '')] = letter;
      }
      entries.sort((a, b) => a.rank - b.rank);
      groups.push({ letter, entries });
    }
    if (groups.length) {
      standings = groups;
      standingsAt = Date.now();
      renderGroups();
      if (view === 'matches') { renderHero(); renderSchedule(); }  // meta lines gain group letters
    }
  } catch (err) {
    if (!standings) {
      $('groups').innerHTML =
        '<div class="state-panel">Couldn’t load standings.<br><small>' + esc(err.message) +
        '</small><br><button onclick="standingsAt=0;fetchStandings()">Retry</button></div>';
    }
  } finally {
    fetchingStandings = false;
  }
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  if (refreshMode === 'off') return;
  let ms;
  if (refreshMode === 'smart') {
    const now = Date.now();
    const anyLive = events.some(e => e.state === 'in');
    const next = events.find(e => e.state === 'pre');
    ms = 5 * 60 * 1000;                                     // idle: 5 min
    if (anyLive) ms = 30 * 1000;                            // live: 30 s
    else if (next && next.date - now < 15 * 60 * 1000) ms = 60 * 1000;  // near kickoff: 1 min
  } else {
    ms = Number(refreshMode) * 1000;
  }
  refreshTimer = setTimeout(fetchData, ms);
}

function updatedLabel() {
  const when = lastUpdated ? 'updated ' + fmtTime.format(lastUpdated) + ' · ' : '';
  $('updated').textContent = when + MODE_LABEL[refreshMode];
}

function setRefreshMode(m) {
  refreshMode = m;
  try { localStorage.setItem('wc26-refresh', m); } catch {}
  document.querySelectorAll('#autoMenu button').forEach(b =>
    b.classList.toggle('sel', b.dataset.mode === m));
  updatedLabel();
  toggleMenu(false);
  // turning auto back on with stale data -> catch up now; otherwise just reschedule
  if (m !== 'off' && lastUpdated && Date.now() - lastUpdated.getTime() > 60 * 1000) fetchData();
  else scheduleRefresh();
}

function toggleMenu(open) {
  $('autoMenu').classList.toggle('open', open);
  $('menuBackdrop').classList.toggle('open', open);
}

/* ---------------- formatting ---------------- */

const fmtTime = new Intl.DateTimeFormat(undefined, { hour: 'numeric', minute: '2-digit' });
const fmtDay = new Intl.DateTimeFormat(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
const dayKey = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

function relDay(d) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const that = new Date(d); that.setHours(0, 0, 0, 0);
  const diff = Math.round((that - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return null;
}

function countdownText(d) {
  let s = Math.floor((d - Date.now()) / 1000);
  if (s <= 0) return 'Kicking off…';
  const dd = Math.floor(s / 86400); s %= 86400;
  const hh = Math.floor(s / 3600); s %= 3600;
  const mm = Math.floor(s / 60); const ss = s % 60;
  if (dd > 0) return dd + 'd ' + hh + 'h';
  if (hh > 0) return hh + 'h ' + mm + 'm';
  return mm + 'm ' + String(ss).padStart(2, '0') + 's';
}

function liveClock(e) {
  if (e.statusName.includes('HALFTIME')) return 'HT';
  return e.clock || 'LIVE';
}

function logoImg(t) {
  const src = t.logo || window.CREST_URI;
  return '<img src="' + esc(src) + '" alt="" loading="lazy" ' +
         'onerror="this.onerror=null;this.src=window.CREST_URI">';
}

function scoreStr(t) {
  let s = esc(t.score ?? '');
  if (t.shootout != null) s += ' <span class="pens">(' + esc(t.shootout) + ')</span>';
  return s;
}

function roundLabel(e) {
  if (e.round === 'group-stage') {
    const letter = teamGroup[e.home.id] || teamGroup[e.away.id];
    if (letter) return 'Group ' + letter;
  }
  return ROUND_NAMES[e.round] || e.round;
}

const scorersFor = (e, t) =>
  e.goals.filter(g => g.teamId === t.id).map(g => g.text).join(', ');

/* ---------------- rendering ---------------- */

function render() {
  renderHero();
  renderChips();
  renderSchedule();
  updatedLabel();
  $('todayBtn').style.display = (view === 'matches' && events.length) ? 'block' : 'none';
  const live = events.find(e => e.state === 'in');
  document.title = live
    ? (live.home.abbr || live.home.name) + ' ' + (live.home.score ?? '') + '–' +
      (live.away.score ?? '') + ' ' + (live.away.abbr || live.away.name) + ' · WC26'
    : 'World Cup 2026 — Live';
  maybeAutoScroll();
}

function heroCard(e, kind) {
  const isLive = kind === 'live';
  const tag = isLive
    ? '<span class="dot"></span> Live · ' + esc(liveClock(e))
    : 'Up Next';
  const mid = isLive
    ? '<div class="hero-score">' + scoreStr(e.home) + ' – ' + scoreStr(e.away) + '</div>'
    : '<div class="hero-vs">vs</div>';
  const rel = relDay(e.date);
  const when = (rel ? rel : fmtDay.format(e.date)) + ' · ' + fmtTime.format(e.date);
  let sub = '';
  if (isLive) {
    const hs = scorersFor(e, e.home), as = scorersFor(e, e.away);
    if (hs || as) sub = '<div class="hero-scorers"><div>' + esc(hs) + '</div><div>' + esc(as) + '</div></div>';
  } else {
    sub = '<div class="hero-sub">Kicks off in <b id="cd" data-ts="' + e.date.getTime() + '">' +
      countdownText(e.date) + '</b> · ' + esc(when) + '</div>';
  }
  const meta = [roundLabel(e), e.venue, e.tv].filter(Boolean).join(' · ');
  return '<div class="hero-card ' + (isLive ? 'live' : 'next') + '" data-goto="' + esc(e.id) + '">' +
    '<div class="hero-tag">' + tag + '</div>' +
    '<div class="hero-row">' +
      '<div class="hero-team">' + logoImg(e.home) + '<span class="tname">' + esc(teamName(e.home)) + '</span></div>' +
      '<div class="hero-mid">' + mid + '</div>' +
      '<div class="hero-team">' + logoImg(e.away) + '<span class="tname">' + esc(teamName(e.away)) + '</span></div>' +
    '</div>' + sub +
    '<div class="hero-meta">' + esc(meta) + '</div>' +
  '</div>';
}

function renderHero() {
  const live = events.filter(e => e.state === 'in');
  let html = '';
  if (live.length) {
    html = live.map(e => heroCard(e, 'live')).join('');
  } else {
    const next = events.find(e => e.state === 'pre');
    if (next) html = heroCard(next, 'next');
  }
  $('hero').innerHTML = html;
}

function renderChips() {
  const el = $('chips');
  if (!events.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = CHIP_DEFS.map(c =>
    '<button class="chip' + (filter === c.id ? ' active' : '') + '" data-f="' + c.id + '">' + c.label + '</button>'
  ).join('');
}

function matchesFilter(e) {
  if (filter === 'all') return true;
  const def = CHIP_DEFS.find(c => c.id === filter);
  const slugs = def && def.slugs ? def.slugs : [filter];
  return slugs.includes(e.round);
}

function gameRow(e) {
  const cls = 'game ' + e.state;
  let when;
  if (e.state === 'in') when = '<span class="live-clock">' + esc(liveClock(e)) + '</span>';
  else if (e.state === 'post') when = '<span class="ft">' + esc(e.shortDetail || 'FT') + '</span>';
  else when = fmtTime.format(e.date);

  const showScore = e.state !== 'pre';
  const trow = (t, opp) => {
    const lost = e.state === 'post' && !t.winner && (opp.winner || Number(t.score) < Number(opp.score));
    const sc = scorersFor(e, t);
    return '<div class="trow' + (lost ? ' loser' : '') + '">' + logoImg(t) +
      '<span class="nm' + (t.tbd ? ' tbd' : '') + '">' + esc(teamName(t)) + '</span>' +
      (showScore ? '<span class="sc">' + scoreStr(t) + '</span>' : '') +
    '</div>' +
    (sc ? '<div class="scorers">' + esc(sc) + '</div>' : '');
  };
  const meta = [roundLabel(e), e.venue, e.tv].filter(Boolean).join(' · ');
  return '<div class="' + cls + '" id="g-' + esc(e.id) + '">' +
    '<div class="when">' + when + '</div>' +
    '<div class="teams">' + trow(e.home, e.away) + trow(e.away, e.home) + '</div>' +
    '<div class="gmeta">' + esc(meta) + '</div>' +
  '</div>';
}

function renderSchedule() {
  const list = events.filter(matchesFilter);
  if (!list.length) {
    $('schedule').innerHTML = '<div class="state-panel">No matches.</div>';
    return;
  }
  const days = new Map();
  for (const e of list) {
    const k = dayKey(e.date);
    if (!days.has(k)) days.set(k, []);
    days.get(k).push(e);
  }
  const todayK = dayKey(new Date());
  let html = '';
  for (const [k, games] of days) {
    const d = games[0].date;
    const rel = relDay(d);
    html += '<section class="day" data-day="' + k + '">' +
      '<div class="day-h">' + (rel ? '<span class="today-tag">' + rel + '</span> · ' : '') +
      fmtDay.format(d) + (k === todayK ? '' : '') + '</div>' +
      '<div class="games">' + games.map(gameRow).join('') + '</div></section>';
  }
  $('schedule').innerHTML = html;
}

function renderGroups() {
  if (!standings) return;
  $('groups').innerHTML = standings.map(g =>
    '<div class="gcard"><h3>Group ' + esc(g.letter) + '</h3>' +
    '<div class="grow hdr"><span></span><span></span><span></span>' +
    '<span class="num">P</span><span class="num">W-D-L</span><span class="num">GD</span><span class="num">Pts</span></div>' +
    g.entries.map(t => {
      const q = t.rank <= 2 ? ' q12' : (t.rank === 3 ? ' q3' : '');
      return '<div class="grow' + q + '">' +
        '<span class="rk">' + t.rank + '</span>' +
        '<img src="' + esc(t.logo || window.CREST_URI) + '" alt="" loading="lazy" onerror="this.onerror=null;this.src=window.CREST_URI">' +
        '<span class="gnm">' + esc(teamName(t)) + '</span>' +
        '<span class="num">' + esc(t.gp) + '</span>' +
        '<span class="num">' + esc(t.record) + '</span>' +
        '<span class="num">' + esc(t.gd) + '</span>' +
        '<span class="num pts">' + esc(t.pts) + '</span>' +
      '</div>';
    }).join('') + '</div>'
  ).join('');
}

function setView(v) {
  view = v;
  $('matchesView').hidden = v !== 'matches';
  $('groupsView').hidden = v !== 'groups';
  $('todayBtn').style.display = (v === 'matches' && events.length) ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (v === 'groups' && Date.now() - standingsAt > 60 * 1000) fetchStandings();
}

function scrollToCurrent(smooth) {
  // live game > next upcoming game > today's section > last section
  const target = events.find(e => e.state === 'in') || events.find(e => e.state === 'pre');
  let el = target && document.getElementById('g-' + target.id);
  if (el) el = el.closest('.day');
  if (!el) {
    const secs = document.querySelectorAll('.day');
    el = secs[secs.length - 1];
  }
  if (el) el.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
}

function maybeAutoScroll() {
  if (didAutoScroll || !events.length) return;
  didAutoScroll = true;
  // only scroll if the tournament already has past days (otherwise top is correct)
  const first = events[0];
  if (dayKey(first.date) < dayKey(new Date())) scrollToCurrent(false);
}

/* ---------------- ticking countdown ---------------- */

setInterval(() => {
  const cd = $('cd');
  if (!cd) return;
  const ts = Number(cd.dataset.ts);
  cd.textContent = countdownText(new Date(ts));
  // kickoff passed → refresh once so the hero flips to live
  if (ts <= Date.now() && !kickoffFetched && refreshMode !== 'off') {
    kickoffFetched = true;
    setTimeout(fetchData, 45 * 1000);   // give the API a moment to flip state
  }
}, 1000);

/* ---------------- events ---------------- */

$('refreshBtn').addEventListener('click', () => fetchData(true));
$('autoBtn').addEventListener('click', () => toggleMenu(!$('autoMenu').classList.contains('open')));
$('menuBackdrop').addEventListener('click', () => toggleMenu(false));
$('autoMenu').addEventListener('click', ev => {
  const b = ev.target.closest('button');
  if (!b) return;
  if (b.dataset.mode) setRefreshMode(b.dataset.mode);
  else if (b.dataset.lang) setLang(b.dataset.lang);
});
document.querySelectorAll('#autoMenu button').forEach(b =>
  b.classList.toggle('sel', b.dataset.mode === refreshMode || b.dataset.lang === lang));
$('todayBtn').addEventListener('click', () => {
  if (filter !== 'all') { filter = 'all'; renderChips(); renderSchedule(); }
  scrollToCurrent(true);
});
$('chips').addEventListener('click', ev => {
  const b = ev.target.closest('.chip');
  if (!b) return;
  filter = b.dataset.f;
  renderChips();
  renderSchedule();
});
document.querySelector('.tabbar').addEventListener('click', ev => {
  const b = ev.target.closest('.tab');
  if (b) setView(b.dataset.view);
});
$('hero').addEventListener('click', ev => {
  const card = ev.target.closest('.hero-card');
  if (!card) return;
  const g = document.getElementById('g-' + card.dataset.goto);
  if (g) g.scrollIntoView({ behavior: 'smooth', block: 'center' });
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') fetchData();
});

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}


fetchData();
</script>
