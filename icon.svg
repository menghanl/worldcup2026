<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16331f"/>
      <stop offset="55%" stop-color="#0f1a22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <clipPath id="ball">
      <circle cx="0" cy="0" r="138"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- soccer ball, flat classic look -->
  <g transform="translate(256 238)">
    <circle r="138" fill="#f4f6f8"/>
    <g clip-path="url(#ball)">
      <!-- center pentagon -->
      <path d="M0,-52 49.4,-16 30.6,42 -30.6,42 -49.4,-16Z" fill="#10151c"/>
      <!-- ring of edge pentagons, centers just outside the rim -->
      <g fill="#10151c">
        <path d="M0,-196 45,-163 28,-110 -28,-110 -45,-163Z"/>
        <path d="M0,-196 45,-163 28,-110 -28,-110 -45,-163Z" transform="rotate(72)"/>
        <path d="M0,-196 45,-163 28,-110 -28,-110 -45,-163Z" transform="rotate(144)"/>
        <path d="M0,-196 45,-163 28,-110 -28,-110 -45,-163Z" transform="rotate(216)"/>
        <path d="M0,-196 45,-163 28,-110 -28,-110 -45,-163Z" transform="rotate(288)"/>
      </g>
      <!-- seams: center pentagon vertices to edge pentagons -->
      <g stroke="#10151c" stroke-width="9" stroke-linecap="round">
        <line x1="0" y1="-52" x2="0" y2="-110"/>
        <line x1="0" y1="-52" x2="0" y2="-110" transform="rotate(72)"/>
        <line x1="0" y1="-52" x2="0" y2="-110" transform="rotate(144)"/>
        <line x1="0" y1="-52" x2="0" y2="-110" transform="rotate(216)"/>
        <line x1="0" y1="-52" x2="0" y2="-110" transform="rotate(288)"/>
      </g>
    </g>
    <circle r="138" fill="none" stroke="#0d1117" stroke-width="8"/>
  </g>

  <!-- "26" badge -->
  <rect x="146" y="380" width="220" height="92" rx="46" fill="#3fb950"/>
  <text x="256" y="447" text-anchor="middle"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" fill="#06130a" letter-spacing="2">26</text>
</svg>
